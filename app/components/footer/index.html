<script type="module" src="https://unpkg.com/@heartlandone/vega@latest/dist/vega/vega.esm.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@heartlandone/vega@latest/dist/vega/vega.css">

<div style="display: flex; align-items: center; gap: 8px; justify-content: center; padding: 16px;">
  <span id="location-text">Running from</span>
  <vega-flag-icon
    id="user-flag"
    size="size-16"
  ></vega-flag-icon>
  <span id="renderdot-text">on <a href="https://render.com" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: underline;">render.com</a></span>
  <span id="turso-text">with <a href="https://turso.tech" target="_blank" rel="noopener noreferrer" style="color: inherit; text-decoration: underline;">Turso Free SQLite</a></span>
</div>

<script>
  // Try to detect user country
  fetch('https://ipapi.co/json/')
    .then(response => response.json())
    .then(data => {
      const flagIcon = document.querySelector('#user-flag');
      const countryName = document.querySelector('#country-name');

      if (flagIcon && data.country_code) {
        flagIcon.setAttribute('country', data.country_code);
        countryName.textContent = data.country_name || data.country_code;
      }
    })
    .catch(() => {
      // Default to US if detection fails
      const flagIcon = document.querySelector('#user-flag');
      const countryName = document.querySelector('#country-name');

      if (flagIcon) {
        flagIcon.setAttribute('country', 'US');
      }
    });
</script>
