<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { padding: 8px 0; }
    #root { display: flex; gap: 8px; flex-wrap: wrap; }
  </style>
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Vega Web Components (HTML version, not React) -->
  <script type="module" src="https://unpkg.com/@heartlandone/vega@latest/dist/vega/vega.esm.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/@heartlandone/vega@latest/dist/vega/vega.css">
</head>
<body>
  <div id="root"></div>

  <script>
    function toStreamlit(msg) {
      window.parent.postMessage({ ...msg, isStreamlitMessage: true }, '*');
    }

    toStreamlit({ type: 'streamlit:componentReady', apiVersion: 1 });

    function handleVegaClick(button, index) {
      if (button.href) {
        window.open(button.href, '_blank', 'noopener,noreferrer');
      }

      toStreamlit({
        type: 'streamlit:setComponentValue',
        value: { clicked: button, index },
        dataType: 'json'
      });
    }

    function render({ buttons = [] }) {
      const root = document.getElementById('root');

      // Clear previous content
      root.innerHTML = '';

      if (buttons.length === 0) {
        root.innerHTML = '<p>No buttons to display</p>';
        return;
      }

      // Create Vega buttons using web components
      buttons.forEach((button, index) => {
        const vegaButton = document.createElement('vega-button');

        // Set attributes
        if (button.label) vegaButton.setAttribute('label', button.label);
        if (button.icon) vegaButton.setAttribute('icon', button.icon);
        if (button.variant) vegaButton.setAttribute('variant', button.variant);
        if (button.iconAlign) vegaButton.setAttribute('icon-align', button.iconAlign);
        if (button.size) vegaButton.setAttribute('size', button.size);
        if (button.disabled) vegaButton.setAttribute('disabled', '');

        // Add click handler
        vegaButton.addEventListener('vegaClick', () => handleVegaClick(button, index));

        // Append to root
        root.appendChild(vegaButton);
      });

      // Set simple fixed height once
      toStreamlit({
        type: 'streamlit:setFrameHeight',
        height: 60
      });
    }

    window.addEventListener('message', (e) => {
      if (e.data.type === 'streamlit:render') {
        render(e.data.args || {});
      }
    });
  </script>
</body>
</html>
